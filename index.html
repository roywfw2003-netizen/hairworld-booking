            <div class="form-group" id="group-school"><label class="required" id="label-school">學校名稱</label><select id="school"><option value="">請選擇學校</option></select></div>
            <div class="form-group" id="group-grade"><label class="required" id="label-grade">年級</label><select id="gradeSelect"><option value="">請選擇年級</option></select></div>
            <div class="form-group" id="group-class"><label class="required" id="label-class">班別</label><select id="letterSelect"><option value="">請先選擇年級</option></select></div>
            <div class="form-group" id="group-studentId"><label class="required" id="label-studentId">學號</label><select id="studentId"><option value="">請先選擇年級與班別</option></select></div>

                <div class="cal-header"><h4 id="studentCalMonthYear"></h4><div class="cal-nav"><button id="studentPrevMonth">←</button><button id="studentNextMonth">→</button></div></div>
                <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
                <div id="studentCalGrid" class="cal-grid"></div>
            </div>
            <div class="form-group"><label class="required">預約時間</label><select id="timeSlot" required></select><div class="note" id="timeNote"></div></div>
            <div id="captchaContainer" style="display: none;"><div class="captcha-group"><span id="captchaQuestion"></span><input type="number" id="captchaAnswer" placeholder="輸入答案" min="0"></div></div>
            <div class="checkbox-wrapper"><input type="checkbox" id="confirmScreenshot"><label for="confirmScreenshot" id="screenshotLabel">確定已截圖的預約記錄</label></div>
            <div class="checkbox-wrapper" style="margin-bottom: 4px;"><input type="checkbox" id="confirmStudentCard"><label for="confirmStudentCard" id="studentCardLabel">我已準備好出示學生證核對</label></div>

            <div id="formFeedback" class="form-feedback"></div>
            <div id="studentInfoArea" class="info-card" style="display: none;"><h4>📋 我的預約記錄</h4><div id="studentInfoContent"></div></div>

                <div class="password-change"><h4>🔐 修改管理員密碼</h4><input type="password" id="newPassword" placeholder="新密碼"><input type="password" id="confirmPassword" placeholder="確認新密碼"><button class="btn-small" id="changePasswordBtn">變更密碼</button></div>
            </div>
        </details>

        <button class="btn-small" id="saveSettingsBtn" style="width:100%; margin:20px 0;">💾 儲存所有設定</button>
        <button class="back-btn" id="backToBookingBtn">⟵ 返回預約頁</button>

        <div class="staff-header">

        <div class="staff-date-picker">

        <div class="record-list" id="pendingList"></div>

        <button class="back-btn" id="backFromStaffBtn">⟵ 返回主頁</button>
    </div>
</div>

    // ========== 新增：請求佇列 (防止高併發崩潰) ==========
    const requestQueue = [];
    let isProcessing = false;

    async function processQueue() {
        if (isProcessing || requestQueue.length === 0) return;
        isProcessing = true;
        
        while (requestQueue.length > 0) {
            const { fn, resolve, reject } = requestQueue.shift();
            try {
                const result = await fn();
                resolve(result);
            } catch (error) {
                reject(error);
            }
            // 每秒最多處理 3 個請求，避免 Firestore 過載
            await new Promise(r => setTimeout(r, 300));
        }
        
        isProcessing = false;
    }

    function enqueueRequest(fn) {
        return new Promise((resolve, reject) => {
            requestQueue.push({ fn, resolve, reject });
            processQueue();
        });
    }

    // ========== 新增：可用時段快取 (減少 Firestore 讀取) ==========
    const availabilityCache = new Map();
    const CACHE_TTL = 5000; // 5秒快取

    function getCachedAvailability(date) {
        const cached = availabilityCache.get(date);
        if (cached && Date.now() - cached.timestamp < CACHE_TTL) {
            return cached.data;
        }
        return null;
    }

    function setCachedAvailability(date, data) {
        availabilityCache.set(date, {
            data,
            timestamp: Date.now()
        });
    }

    function getTodayStr() { const d = new Date(); return d.toISOString().slice(0,10); }

    // ========== 【核心修改】使用事務建立預約，徹底解決超賣 ==========
    async function createBookingWithTransaction(booking) {
        // 使用 enqueueRequest 讓請求排隊，避免瞬間過載
        return enqueueRequest(async () => {
            try {
                // 使用時間段的組合當作文檔 ID，實現樂觀鎖
                const slotId = `${booking.date}_${booking.time}`;
                const slotRef = db.collection("timeSlots").doc(slotId);
                
                // 使用 Firestore 事務確保原子性
                const result = await db.runTransaction(async (transaction) => {
                    const slotDoc = await transaction.get(slotRef);
                    
                    // 如果時段已經被預約，直接返回失敗
                    if (slotDoc.exists && slotDoc.data().booked === true) {
                        return { success: false, error: '時段已被預約' };
                    }
                    
                    // 1. 標記該時段為已預約
                    transaction.set(slotRef, {
                        booked: true,
                        date: booking.date,
                        time: booking.time,
                        bookedAt: new Date().toISOString()
                    });
                    
                    // 2. 建立預約記錄
                    const bookingRef = db.collection("appointments").doc();
                    transaction.set(bookingRef, {
                        ...booking,
                        status: 'pending',
                        createdAt: new Date().toISOString()
                    });
                    
                    return { success: true, bookingId: bookingRef.id };
                });
                
                if (result.success) {
                    // 預約成功後，清除該日期的快取，讓下次查詢重新計算
                    availabilityCache.delete(booking.date);
                }
                
                return result;
            } catch (error) {
                console.error('交易失敗', error);
                return { success: false, error: '系統繁忙，請稍後再試' };
            }
        });
    }

    // ========== 【核心修改】快取版本的獲取可用時段 ==========
    async function getAvailableTimeSlotsWithCache(dateStr) {
        // 先檢查快取
        const cached = getCachedAvailability(dateStr);
        if (cached) {
            console.log('使用快取數據', dateStr);
            return cached;
        }
        
        console.log('從資料庫讀取', dateStr);
        
        // 快取未命中，從 Firestore 獲取
        const baseSlots = isHoliday(dateStr) ? config.holidaySlots : config.weekdaySlots;
        
        // 查詢該日期的所有待處理預約
        const snapshot = await db.collection("appointments")
            .where("date", "==", dateStr)
            .where("status", "==", "pending")
            .get();
        
        const bookedTimes = snapshot.docs.map(doc => doc.data().time);
        const available = baseSlots.filter(t => !bookedTimes.includes(t));
        
        // 存入快取 (5秒後過期)
        setCachedAvailability(dateStr, available);
        
        return available;
    }

    // 判斷假日
    const publicHolidays = [ '2026-01-01', '2026-02-17', '2026-02-18', '2026-02-19', '2026-04-03', '2026-04-04', '2026-04-06', '2026-04-05', '2026-05-01', '2026-05-25', '2026-06-19', '2026-07-01', '2026-10-01', '2026-10-02', '2026-10-21', '2026-12-25', '2026-12-26' ];
    function isPublicHoliday(dateStr) { return publicHolidays.includes(dateStr); }
    function isWeekend(dateStr) { const d = new Date(dateStr+'T12:00:00'); return d.getDay()===0 || d.getDay()===6; }
    function isHoliday(dateStr) { return isWeekend(dateStr) || isPublicHoliday(dateStr); }

    // ========== 更新學生月曆 ==========
    async function renderStudentCalendar() {
        const year = studentYear, month = studentMonth;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        document.getElementById('studentCalMonthYear').innerText = `${year}年${month+1}月`;
        
        // 為了顯示紅色數字，需要獲取所有日期的預約數量
        // 但為了效能，我們只獲取當月有預約的日期
        const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
        const monthBookings = bookings.filter(b => b.date.startsWith(monthStr) && b.status === 'pending');
        const bookingCountMap = {};
        monthBookings.forEach(b => {
            bookingCountMap[b.date] = (bookingCountMap[b.date] || 0) + 1;
        });
        
        let html = '';
        for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty-cell"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let unavailable = dateStr <= getTodayStr();
            
            if (!unavailable && config.dailyCutoff) {
                const tomorrow = new Date(dateStr + 'T00:00:00');
                const now = new Date();
                if (tomorrow.toDateString() === new Date(now.getTime() + 86400000).toDateString()) {
                    const cutoffParts = config.dailyCutoff.split(':');
                    const cutoff = new Date();
                    cutoff.setHours(parseInt(cutoffParts[0]), parseInt(cutoffParts[1]), 0, 0);
                    if (now > cutoff) unavailable = true;
                }
            }
            
            // 使用快取版本的函數獲取可用時段數量來判斷是否已滿
            const avail = await getAvailableTimeSlotsWithCache(dateStr);
            const full = !unavailable && avail.length === 0;
            const selected = dateStr === currentSelectedDate;
            
            let cls = 'cal-cell';
            if (unavailable) cls += ' unavailable';
            else if (isHoliday(dateStr)) cls += ' holiday';
            if (selected) cls += ' selected';
            
            const mark = (unavailable || full) ? '<span class="full-mark">✖</span>' : '';
            const count = bookingCountMap[dateStr] || 0;
            const countMark = count > 0 ? `<span class="booking-count-red">${count}</span>` : '';
            
            html += `<div class="${cls}" data-date="${dateStr}"><span class="day-number">${d}</span>${mark}${countMark}</div>`;
        }
        document.getElementById('studentCalGrid').innerHTML = html;
        
        // 綁定點擊事件
        document.querySelectorAll('#studentCalGrid .cal-cell:not(.empty-cell)').forEach(cell => {
            cell.addEventListener('click', async function() {
                const date = this.dataset.date;
                if (date <= getTodayStr()) { showFeedback('只能預約明天或以後的日期'); return; }
                if (config.dailyCutoff) {
                    const tomorrow = new Date(date + 'T00:00:00');
                    const now = new Date();
                    if (tomorrow.toDateString() === new Date(now.getTime() + 86400000).toDateString()) {
                        const cutoffParts = config.dailyCutoff.split(':');
                        const cutoff = new Date();
                        cutoff.setHours(parseInt(cutoffParts[0]), parseInt(cutoffParts[1]), 0, 0);
                        if (now > cutoff) {
                            showFeedback('今日預約已截止，請選擇其他日期');
                            return;
                        }
                    }
                }
                currentSelectedDate = date;
                await renderTimeSlots(date);
                renderStudentCalendar();
            });
        });
    }

    // ========== 更新時段下拉選單 ==========

            note.innerText = ''; 
            return; 
        }
        
        const avail = await getAvailableTimeSlotsWithCache(date);
        
        if (avail.length === 0) { 
            sel.innerHTML = '<option value="">本日已滿</option>'; 
            note.innerText = '⚠️ 所有時段已被預約'; 
        } else { 
            sel.innerHTML = avail.map(t => `<option value="${t}">${t}</option>`).join(''); 
            note.innerText = `可預約時段 (共 ${avail.length} 個)`; 
        }
    }

        }
    }

    // ========== 年級連動 (與您原本相同) ==========
    function getGradeNumber(gradeName) {
        const index = config.gradeNames.indexOf(gradeName);
        return index >= 0 ? (index + 1).toString() : null;
    }

    function updateLetterSelect() {
        const gradeSelect = document.getElementById('gradeSelect');
        const letterSelect = document.getElementById('letterSelect');
        const gradeName = gradeSelect.value;
        if (!gradeName) { 
            letterSelect.innerHTML = '<option value="">請先選擇年級</option>'; 
            return; 
        }
        const currentLetter = letterSelect.value;
        let options = '<option value="">請選擇班別</option>';
        config.letterNames.forEach(letter => options += `<option value="${letter}">${letter}</option>`);
        letterSelect.innerHTML = options;
        if (currentLetter && config.letterNames.includes(currentLetter)) {
            letterSelect.value = currentLetter;
        }
        updateStudentIdSelect();
    }

    function updateStudentIdSelect() {
        const gradeName = document.getElementById('gradeSelect').value;
        const letter = document.getElementById('letterSelect').value;
        const studentSelect = document.getElementById('studentId');
        if (!gradeName || !letter) { 
            studentSelect.innerHTML = '<option value="">請先選擇年級與班別</option>'; 
            return; 
        }
        const gradeNum = getGradeNumber(gradeName);
        if (!gradeNum) { 
            studentSelect.innerHTML = '<option value="">年級對應錯誤</option>'; 
            return; 
        }
        const className = gradeNum + letter;
        const limit = config.limits[className] || 25;
        const currentStudent = studentSelect.value;
        let options = '<option value="">請選擇學號</option>';
        for (let i = 1; i <= limit; i++) options += `<option value="${i}">${i}</option>`;
        studentSelect.innerHTML = options;
        if (currentStudent && currentStudent >= 1 && currentStudent <= limit) {
            studentSelect.value = currentStudent;
        }
    }

    document.getElementById('gradeSelect').addEventListener('change', updateLetterSelect);
    document.getElementById('letterSelect').addEventListener('change', updateStudentIdSelect);

    // ========== 初始化 ==========
    (async function init() {
        await auth.signInAnonymously();
        await fetchConfig();
        await fetchBookings();
        
        // 初始化學校下拉選單
        const schoolSelect = document.getElementById('school');
        config.School.forEach(s => {
            if (s.enabled) {
                const option = document.createElement('option');
                option.value = s.name;
                option.textContent = s.name;
                schoolSelect.appendChild(option);
            }
        });
        
        // 初始化年級下拉選單
        const gradeSelect = document.getElementById('gradeSelect');
        config.gradeNames.forEach(g => {
            const option = document.createElement('option');
            option.value = g;
            option.textContent = g;
            gradeSelect.appendChild(option);
        });
        
        // 初始化頁面
        document.getElementById('screenshotLabel').textContent = config.screenshotLabel;
        document.getElementById('studentCardLabel').textContent = config.studentCardLabel;
        document.getElementById('bookingNoticeContent').innerHTML = config.notice.replace(/\n/g, '<br>');
        
        renderStudentCalendar();
        renderTimeSlots(currentSelectedDate);
        
        // 月曆切換
        document.getElementById('studentPrevMonth').addEventListener('click', function() { studentMonth--; if (studentMonth<0) { studentMonth=11; studentYear--; } renderStudentCalendar(); });
        document.getElementById('studentNextMonth').addEventListener('click', function() { studentMonth++; if (studentMonth>11) { studentMonth=0; studentYear++; } renderStudentCalendar(); });
    })();
})();
</script>
</body>
</html>
