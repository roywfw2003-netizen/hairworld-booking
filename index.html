<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Hair World 管理員後台 (v4.0)</title>
    <!-- Firebase SDK 10.13.0 -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #FFF5E6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 12px 0 30px 0; margin: 0; }
        .app-container { width: 100%; max-width: 500px; background-color: white; border-radius: 32px 32px 0 0; box-shadow: 0 8px 30px rgba(247, 147, 49, 0.15); overflow: hidden; padding: 20px 20px 30px 20px; margin: 10px 12px; border: 1px solid #FFD8B2; }
        .brand { display: flex; align-items: center; margin-bottom: 20px; padding-left: 6px; }
        .brand h1 { font-size: 28px; font-weight: 700; color: #F25C0A; letter-spacing: 1px; background: white; padding: 0 12px 0 0; }
        .brand span { background: #F25C0A; color: white; font-size: 14px; padding: 4px 12px; border-radius: 40px; font-weight: 500; margin-left: 4px; }
        .page { display: block; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 18px; }
        label { font-size: 15px; font-weight: 600; color: #77450E; display: block; margin-bottom: 5px; margin-left: 4px; }
        .required::after { content: " *"; color: #F25C0A; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 16px 18px; border: 1.5px solid #FFCDA5; border-radius: 50px; font-size: 16px; background-color: white; transition: 0.2s; outline: none; color: #2D1F0C; height: auto; line-height: 1.2; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23F25C0A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 18px center; background-size: 16px; }
        textarea { border-radius: 28px; min-height: 80px; }
        .checkbox-wrapper { display: flex; flex-direction: row; align-items: center; background: #FFF2E3; border-radius: 50px; padding: 12px 18px; border: 1px solid #FFCDA5; min-height: 58px; margin-bottom: 12px; }
        .checkbox-wrapper input[type="checkbox"] { width: 24px; height: 24px; margin-right: 12px; accent-color: #F25C0A; flex-shrink: 0; }
        .checkbox-wrapper label { margin: 0; font-weight: 500; color: #4F310B; font-size: 16px; }
        .checkbox-note { font-size: 13px; color: #ff4d4d; margin-left: 42px; margin-top: -8px; margin-bottom: 18px; font-weight: 500; }
        .btn { background: #F25C0A; color: white; border: none; padding: 16px 18px; border-radius: 60px; font-size: 18px; font-weight: 700; width: 100%; margin-top: 12px; cursor: pointer; box-shadow: 0 6px 0 #B04400; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #B04400; }
        .btn-secondary { background: white; color: #F25C0A; border: 2px solid #F25C0A; box-shadow: none; font-weight: 600; margin-top: 8px; }
        .btn-small { background: #FFE1C7; color: #B04400; border: none; box-shadow: none; font-size: 16px; padding: 12px; font-weight: 600; margin-top: 5px; cursor: pointer; border-radius: 40px; }
        .btn-success { background: #28a745; color: white; border: none; box-shadow: 0 4px 0 #1e7e34; }
        .btn-danger { background: #dc3545; color: white; border: none; box-shadow: 0 4px 0 #bd2130; }
        .btn-warning { background: #ffc107; color: #333; border: none; box-shadow: 0 4px 0 #d39e00; }
        .btn-info { background: #17a2b8; color: white; border: none; box-shadow: 0 4px 0 #117a8b; }
        .divider { height: 1px; background: #FFD8B2; margin: 26px 0 18px 0; }

        .admin-row input { flex: 2; padding: 14px 16px; height: 52px; }
        .admin-row button { flex: 1; margin-top: 0; padding: 14px 0; font-size: 16px; height: 52px; }
        .info-card { background: #FFF2E3; border-radius: 28px; padding: 16px; margin: 20px 0 12px; border: 1px solid #FFB985; }
        .info-card h4 { color: #B04400; margin-bottom: 8px; font-size: 18px; }
        .info-card p { margin: 5px 0; font-size: 16px; color: #2D1F0C; }
        .form-feedback { margin: 8px 0 0 0; padding: 10px 16px; border-radius: 40px; background: #FFE6D3; color: #B04400; font-size: 15px; font-weight: 500; display: none; }
        .form-feedback.error { background: #ffe6e6; color: #c00; border: 1px solid #ff9999; }
        .form-feedback.success { background: #e6ffe6; color: #0a0; }
        .social-links { display: flex; justify-content: space-around; align-items: center; margin: 20px 0 10px; padding: 12px; background: #FFF2E3; border-radius: 50px; border: 1px solid #FFB985; }
        .social-link { display: flex; align-items: center; gap: 8px; color: #F25C0A; text-decoration: none; font-size: 16px; font-weight: 600; padding: 5px 15px; border-radius: 30px; background: white; box-shadow: 0 2px 0 #FFCDA5; }
        .footer-note { margin-top: 20px; padding: 16px; background: #FFF2E3; border-radius: 28px; border: 1px solid #FFB985; font-size: 14px; color: #77450E; }
        .student-calendar { margin-top: 0px; margin-bottom: 18px; background: #FFF9F2; border-radius: 28px; padding: 15px; border: 1px solid #FFD8B2; position: relative; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-header h4 { color: #F25C0A; font-size: 18px; margin: 0; }
        .cal-nav { display: flex; gap: 10px; }
        .cal-nav button { background: #FFE6D3; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; color: #F25C0A; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #FFB27F; }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 600; color: #B45A2A; margin-bottom: 8px; font-size: 14px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-cell { aspect-ratio: 1 / 1; background: white; border-radius: 12px; border: 1px solid #FFD8B2; display: flex; justify-content: center; align-items: center; font-weight: 600; color: #4F310B; position: relative; cursor: pointer; }
        .cal-cell.holiday { color: #ff0000; border: 2px solid #ff4d4d; background: #ffe6e6; }
        .cal-cell.selected { background: #F25C0A; color: white !important; border-color: #F25C0A; }
        .cal-cell.unavailable { background: #f0f0f0; color: #aaa; cursor: not-allowed; }
        .cal-cell .full-mark { position: absolute; top: 0; right: 2px; color: #ff0000; font-size: 16px; font-weight: bold; }
        .empty-cell { background: transparent; border: none; cursor: default; }
        .booking-count-red { position: absolute; bottom: 2px; right: 2px; width: 20px; height: 20px; background-color: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 600; color: #B45A2A; margin-bottom: 8px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 20px; }
        .calendar-header h2 { color: #F25C0A; font-size: 22px; flex: 1; text-align: center; }
        .month-nav { display: flex; gap: 10px; }
        .month-nav button { background: #FFE6D3; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 24px; color: #F25C0A; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #FFB27F; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-cell { aspect-ratio: 1 / 1; background: #FFF9F2; border-radius: 16px; border: 1px solid #FFD8B2; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; padding: 6px; font-weight: 600; color: #4F310B; position: relative; cursor: pointer; }
        .calendar-cell.holiday { border: 2px solid #ff4d4d; background: #ffe6e6; }
        .calendar-cell .day-number { font-size: 16px; align-self: flex-start; }
        .calendar-cell .booking-count-red { position: absolute; bottom: 4px; right: 4px; width: 20px; height: 20px; background-color: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; }
        .calendar-cell .full-mark { position: absolute; top: 2px; right: 2px; color: #ff0000; font-size: 18px; font-weight: bold; z-index: 3; text-shadow: 0 0 2px white; }
        .detail-panel { background: #FFF2E3; border-radius: 28px; padding: 18px 16px; margin: 20px 0 12px; border: 1px solid #FFB985; }
        .appointment-item { background: white; border-radius: 40px; padding: 12px 16px; margin-bottom: 8px; border-left: 6px solid #F25C0A; font-size: 15px; display: flex; align-items: center; gap: 0 10px; flex-wrap: wrap; }
        .appointment-item .actions { margin-left: auto; display: flex; gap: 5px; }
        .delete-btn { background: #ff6b6b; color: white; border: none; border-radius: 30px; padding: 5px 12px; font-size: 13px; cursor: pointer; box-shadow: 0 2px 0 #b30000; }
        .complete-btn { background: #28a745; color: white; border: none; border-radius: 30px; padding: 5px 12px; font-size: 13px; cursor: pointer; box-shadow: 0 2px 0 #1e7e34; }
        .back-btn { background: white; border: 2px solid #F25C0A; color: #F25C0A; font-weight: 600; padding: 14px; border-radius: 40px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 20px; text-align: center; }
        .note { color: #B45A2A; font-size: 14px; margin: 8px 0 0 8px; }
        .settings-section { margin-bottom: 10px; border: 1px solid #FFB985; border-radius: 20px; background: #FFF9F2; }
        .settings-section summary { font-weight: 600; color: #F25C0A; padding: 12px 15px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .settings-section summary::-webkit-details-marker { display: none; }
        .settings-section summary::after { content: '▼'; font-size: 12px; transition: transform 0.2s; }
        .settings-section[open] summary::after { transform: rotate(180deg); }
        .settings-section .section-content { padding: 0 15px 15px 15px; }
        .grade-scroll-container { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 10px; margin-bottom: 10px; display: flex; gap: 12px; }
        .grade-card { display: inline-block; min-width: 160px; background: white; border: 1px solid #FFB985; border-radius: 20px; padding: 10px; white-space: normal; vertical-align: top; }
        .grade-title { font-weight: 700; color: #F25C0A; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .class-list { display: flex; flex-direction: column; gap: 6px; }
        .class-item { display: flex; align-items: center; gap: 5px; }
        .class-item input[type="checkbox"] { width: 18px; height: 18px; margin: 0; }
        .class-item select { width: 60px; padding: 3px; border-radius: 15px; border: 1px solid #FFB985; font-size: 12px; }
        .action-buttons { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        .school-list, .item-list { margin: 10px 0; }
        .school-item, .item-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .school-item input, .item-row input { flex: 1; padding: 10px 12px; border-radius: 40px; border: 1px solid #FFB985; }
        .school-item .remove-school, .item-row .remove-item { background: #ff6b6b; color: white; border: none; border-radius: 30px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
        .add-school, .add-item { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
        .suspicious-panel { margin-top: 20px; border: 2px solid #dc3545; border-radius: 28px; padding: 15px; background: #fff8f8; }
        .suspicious-table { max-height: 200px; overflow-y: auto; border: 1px solid #ffb0b0; border-radius: 20px; background: white; }
        .suspicious-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .suspicious-table th { background: #ffe0e0; color: #a00; padding: 6px 2px; position: sticky; top: 0; }
        .database-panel { margin-top: 20px; border: 2px solid #F25C0A; border-radius: 28px; padding: 15px; background: #FFF9F2; }
        .sortable-table { max-height: 400px; overflow-y: auto; border: 1px solid #FFB985; border-radius: 20px; background: white; margin-top: 10px; }
        .sortable-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .sortable-table th { background: #FFE6D3; color: #B04400; padding: 10px 8px; position: sticky; top: 0; z-index: 2; text-align: left; }
        .sortable-table td { padding: 10px 8px; border-bottom: 1px solid #FFE6D3; vertical-align: middle; }
        .sortable-table tr:hover { background: #FFF5E6; }
        .action-btn { background: #F25C0A; color: white; border: none; border-radius: 30px; padding: 5px 12px; font-size: 11px; cursor: pointer; margin: 0 2px; box-shadow: 0 1px 0 #B04400; }
        .delete-row-btn { background: #ff6b6b; }
        .password-change { margin-top: 15px; border-top: 2px solid #FFB985; padding-top: 15px; }
        .shadow-calendar { margin-top: 20px; border: 2px solid #F25C0A; border-radius: 28px; padding: 15px; background: #FFF9F2; }
        .shadow-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .shadow-header h5 { color: #F25C0A; font-size: 18px; margin: 0; }
        .shadow-nav { display: flex; gap: 10px; }
        .shadow-nav button { background: #FFE6D3; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; color: #F25C0A; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #FFB27F; }
        .shadow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
        .shadow-cell { aspect-ratio: 1 / 1; background: white; border-radius: 12px; border: 1px solid #FFD8B2; display: flex; justify-content: center; align-items: center; font-weight: 600; color: #4F310B; position: relative; cursor: pointer; }
        .shadow-cell.holiday { border: 2px solid #ff4d4d; background: #ffe6e6; }
        .shadow-cell .shadow-mark { position: absolute; bottom: 2px; right: 2px; width: 20px; height: 20px; background-color: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        .shadow-footer { display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
        .sync-switch { display: flex; align-items: center; gap: 5px; font-size: 14px; background: #FFE6D3; padding: 5px 12px; border-radius: 30px; }
        .field-setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; background: #FFF9F2; padding: 8px 12px; border-radius: 40px; border: 1px solid #FFCDA5; }
        .field-setting-row label { margin: 0; font-size: 14px; white-space: nowrap; }
        .field-setting-row input[type="checkbox"] { width: 18px; height: 18px; margin: 0; accent-color: #F25C0A; }
        .field-setting-row .field-label { font-weight: 600; color: #B04400; min-width: 60px; }
        .time-slot-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .time-slot-item { background: #FFE6D3; border-radius: 30px; padding: 5px 12px; display: flex; align-items: center; gap: 6px; }
        .time-slot-item button { background: #ff6b6b; border: none; color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; cursor: pointer; }
        .add-time-slot { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .staff-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .staff-header h3 { color: #F25C0A; }
        .staff-date-picker { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; }
        .staff-date-picker input { flex: 1; padding: 12px; }
        .record-list { max-height: 300px; overflow-y: auto; border: 1px solid #FFB985; border-radius: 20px; padding: 10px; background: white; margin-bottom: 20px; }
        .record-item { border-bottom: 1px solid #FFE6D3; padding: 10px 0; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .record-item:last-child { border-bottom: none; }
        .record-info { flex: 1; min-width: 150px; }
        .record-actions { display: flex; gap: 5px; align-items: center; }
        .edit-mode-badge { background: #ffc107; color: #333; padding: 2px 8px; border-radius: 30px; font-size: 12px; }
        .total-badge { background: #F25C0A; color: white; padding: 5px 12px; border-radius: 30px; font-size: 14px; margin-left: 10px; }
        .completed-section, .noshow-section { margin-top: 20px; border-top: 2px dashed #FFB985; padding-top: 15px; }
        .barber-selector { display: flex; gap: 5px; margin-top: 5px; }
        .barber-selector label { font-size: 13px; margin-right: 5px; }
        .barber-selector input[type="radio"] { width: auto; margin-right: 2px; }
        .list-header { display: flex; font-weight: bold; padding: 8px 0; border-bottom: 2px solid #FFB985; margin-bottom: 8px; color: #B04400; background: #FFF5E6; }
        .list-header span { flex: 1; padding: 0 4px; }
        .stats-container { margin-top: 20px; padding: 15px; background: white; border-radius: 28px; border: 2px solid #F25C0A; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .stats-header h3 { color: #F25C0A; margin: 0; }

        .stats-summary { display: flex; gap: 15px; justify-content: space-around; margin-top: 15px; flex-wrap: wrap; }

        .summary-card .label { font-size: 14px; color: #B04400; }

        .table-section h4 { color: #B04400; margin-bottom: 12px; font-size: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .badge-student { background: #F25C0A; }

<body>
<div class="app-container" id="appContainer">
    <div class="brand"><h1>Hair World</h1><span>管理員後台 v4.0</span></div>

    <div id="loginPage" class="page">
        <div style="text-align: center; margin: 40px 0;">
            <i class="fa-solid fa-lock" style="font-size: 48px; color: #F25C0A;"></i>
            <h2 style="margin: 20px 0; color: #B04400;">管理員登入</h2>
            <div class="form-group"><input type="password" id="adminLoginPass" placeholder="請輸入管理員密碼"></div>
            <button class="btn" id="adminLoginBtn">登入</button>
            <div style="margin-top: 20px;"><button class="btn-secondary" id="backToMainBtn">返回主頁</button></div>
        </div>
    </div>

    <!-- 管理員主頁面 -->
    <div id="adminMainPage" class="page hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <div>
                <button class="btn-small" id="showStatsBtn">📊 統計報表</button>
                <button class="btn-small" id="refreshDataBtn">🔄 刷新數據</button>
            </div>
            <label class="sync-switch"><span>同步主頁月曆</span><input type="checkbox" id="syncMainCalendar" checked></label>
        </div>
        
        <div id="statsSection" class="stats-container hidden">
            <div class="stats-header">
                <h3>📊 理髮師統計報表</h3>
                <div>
                    <input type="password" id="ownerPass" placeholder="店主密碼" style="width:120px; padding:8px; border-radius:30px; border:1px solid #FFB985;">
                    <button class="btn-small" id="unlockStatsBtn">解鎖</button>
                </div>
            </div>
            <div id="statsContent" style="display:none;">
                <div class="chart-container">
                    <canvas id="barberChart"></canvas>
                </div>
                <div class="stats-summary">
                    <div class="summary-card">
                        <div class="number" id="totalStudents">0</div>
                        <div class="label">已剪學童</div>
                    </div>
                    <div class="summary-card">
                        <div class="number" id="totalVouchers">0</div>
                        <div class="label">已買優惠券</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 月曆區塊 - 顯示學生+家長總預約人數 -->
        <div class="calendar-header">
            <div class="month-nav"><button id="prevMonth">←</button></div>
            <h2 id="monthYearDisplay"></h2>
            <div class="month-nav"><button id="nextMonth">→</button></div>
        </div>
        <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
        <div id="calendarGrid" class="calendar-grid"></div>
        
        <div id="dailyDetail" class="detail-panel">
            <h3 id="selectedDateTitle">點擊日期查看預約</h3>
            <div id="appointmentList"></div>
        </div>
        
        <div class="suspicious-panel" id="suspiciousPanel"><h4>🚨 可疑活動監控</h4><div class="suspicious-table" id="suspiciousTable"></div><div class="clear-suspicious"><button class="btn-small" id="clearSuspicious">清除舊記錄</button></div></div>
        
        <div class="shadow-calendar">
            <div class="shadow-header"><h5 id="shadowMonthYear"></h5><div class="shadow-nav"><button id="shadowPrevMonth">←</button><button id="shadowNextMonth">→</button></div></div>
            <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div id="shadowGrid" class="shadow-grid"></div>
            <div class="shadow-footer"><button class="btn-small" id="clearShadowMonth">清除本月數字</button></div>
        </div>
        
        <!-- ========== 學生預約記錄區塊 ========== -->
        <div class="database-panel" style="margin-top: 20px;">
            <h4>
                <i class="fa-solid fa-user-graduate" style="color:#F25C0A;"></i> 學生預約記錄
                <span style="font-size:14px; margin-left:10px;">
                    <label><input type="checkbox" id="showStudentAllStatus"> 顯示所有狀態</label>
                    <span id="studentTotalCount" style="margin-left:10px;">(總數: 0)</span>
                </span>
            </h4>
            
            <div class="table-section">
                <div class="sortable-table" id="studentPendingTable"></div>
            </div>
            
            <div class="completed-section">
                <h4>✅ 學生已完成預約 <span class="total-badge" id="studentCompletedTotal">0</span></h4>
                <div class="sortable-table" id="studentCompletedTable"></div>
            </div>
            
            <div class="noshow-section">
                <h4>❌ 學生未到達預約 <span class="total-badge" id="studentNoshowTotal">0</span></h4>
                <div class="sortable-table" id="studentNoshowTable"></div>
                <button class="btn-small" id="cleanStudentOldNoShow">清除昨日未到達</button>
            </div>
        </div>

        <!-- ========== 家長預約記錄區塊 ========== -->
        <div class="database-panel" style="margin-top:20px; border-color:#28a745;">
            <h4>
                <i class="fa-solid fa-ticket" style="color:#28a745;"></i> 家長優惠券預約記錄
                <span style="font-size:14px; margin-left:10px;">
                    <label><input type="checkbox" id="showParentAllStatus"> 顯示所有狀態</label>
                    <span id="parentTotalCount" style="margin-left:10px;">(總數: 0)</span>
                </span>
            </h4>
            
            <div class="table-section">
                <div class="sortable-table" id="parentPendingTable"></div>
            </div>
            
            <div class="completed-section">
                <h4>✅ 家長已完成預約 <span class="total-badge" id="parentCompletedTotal">0</span></h4>
                <div class="sortable-table" id="parentCompletedTable"></div>
            </div>
            
            <div class="noshow-section">
                <h4>❌ 家長未到達預約 <span class="total-badge" id="parentNoshowTotal">0</span></h4>
                <div class="sortable-table" id="parentNoshowTable"></div>
                <button class="btn-small" id="cleanParentOldNoShow">清除昨日未到達</button>
            </div>
        </div>

        <button class="btn-small" id="saveSettingsBtn" style="width:100%; margin:20px 0;">💾 儲存所有設定</button>
        <button class="back-btn" id="backToLoginBtn">⟵ 返回登入</button>
    </div>
</div>

<script>
(function() {
    const firebaseConfig = {
        apiKey: "AIzaSyCTgUIWXKjNZqp-bC1jk-XxZvoMihs6vO4",
        authDomain: "hairworld-2026.firebaseapp.com",
        projectId: "hairworld-2026",
        storageBucket: "hairworld-2026.firebasestorage.app",
        messagingSenderId: "531811271889",
        appId: "1:531811271889:web:62bf3e37996b9b154831f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.signInAnonymously().catch(console.error);

    const ADMIN_PASSWORD = "admin123";
    let bookings = [];          // 所有預約
    let studentBookings = [];   // 學生預約
    let parentBookings = [];     // 家長預約
    
    let adminYear = new Date().getFullYear();
    let adminMonth = new Date().getMonth();
    let shadowMarks = JSON.parse(localStorage.getItem('hairWorldShadowMarks')) || {};
    let syncMain = localStorage.getItem('hairWorldSyncMain') !== 'false';
    let chartInstance = null;

    function getTodayStr() { const d = new Date(); return d.toISOString().slice(0,10); }
    
    async function fetchAllBookings() {
        try {
            const snapshot = await db.collection("appointments").get();
            bookings = [];
            snapshot.forEach(doc => {
                let data = doc.data();
                data.id = doc.id;
                if (data.date && data.date.includes('T')) data.date = data.date.split('T')[0];
                if (!data.status) data.status = 'pending';
                if (!data.type) data.type = 'student';
                if (!data.voucherPurchased) data.voucherPurchased = false;
                bookings.push(data);
            });
            studentBookings = bookings.filter(b => b.type === 'student');
            parentBookings = bookings.filter(b => b.type === 'voucher');
        } catch (error) {
            console.error('讀取預約失敗', error);
            bookings = [];
            studentBookings = [];
            parentBookings = [];
        }
    }

    // 判斷是否為假日
    const publicHolidays = ['2026-01-01', '2026-02-17', '2026-02-18', '2026-02-19', '2026-04-03', '2026-04-04', '2026-04-06', '2026-04-05', '2026-05-01', '2026-05-25', '2026-06-19', '2026-07-01', '2026-10-01', '2026-10-02', '2026-10-21', '2026-12-25', '2026-12-26'];
    function isWeekend(dateStr) { const d = new Date(dateStr+'T12:00:00'); return d.getDay()===0 || d.getDay()===6; }
    function isPublicHoliday(dateStr) { return publicHolidays.includes(dateStr); }
    function isHoliday(dateStr) { return isWeekend(dateStr) || isPublicHoliday(dateStr); }

    // 獲取當日總預約人數（學生 + 家長）
    function getTotalBookingCount(dateStr) {
        return bookings.filter(b => b.date === dateStr && b.status === 'pending').length;
    }

    // 渲染管理員月曆（顯示學生+家長總預約人數）
    function renderAdminCalendar() {
        const year = adminYear, month = adminMonth;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const totalPending = bookings.filter(b => b.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`) && b.status === 'pending').length;
        document.getElementById('monthYearDisplay').innerText = `${year}年${month+1}月 (待處理 ${totalPending})`;
        
        let html = '';
        for (let i = 0; i < firstDay; i++) html += '<div class="calendar-cell empty-cell"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = getTotalBookingCount(dateStr);
            const holiday = isHoliday(dateStr) ? 'holiday' : '';
            const unavailable = dateStr <= getTodayStr();
            html += `<div class="calendar-cell ${holiday}" data-date="${dateStr}">
                        <span class="day-number">${d}</span>
                        ${count ? `<span class="booking-count-red">${count}</span>` : ''}
                        ${unavailable ? '<span class="full-mark">✖</span>' : ''}
                     </div>`;
        }
        document.getElementById('calendarGrid').innerHTML = html;
        
        // 綁定日期點擊事件
        document.querySelectorAll('#calendarGrid .calendar-cell').forEach(cell => {
            cell.addEventListener('click', () => {
                const date = cell.dataset.date;
                if (date) showDateDetail(date);
            });
        });
    }

    function showDateDetail(dateStr) {
        const title = document.getElementById('selectedDateTitle');
        const listDiv = document.getElementById('appointmentList');
        if (!dateStr) { title.innerText = '點擊日期查看預約'; listDiv.innerHTML = ''; return; }
        
        const dayBookings = bookings.filter(b => b.date === dateStr && b.status === 'pending').sort((a,b)=>a.time.localeCompare(b.time));
        if (dayBookings.length === 0) {
            title.innerText = `${dateStr} 無待處理預約`;
            listDiv.innerHTML = '<div style="padding:10px;">當日尚無待處理預約</div>';
        } else {
            title.innerText = `${dateStr} 待處理預約 (${dayBookings.length}人)`;
            let html = '';
            dayBookings.forEach(b => {
                const typeIcon = b.type === 'voucher' ? '🎟️' : '👨‍🎓';
                html += `<div class="appointment-item" data-id="${b.id}" data-date="${b.date}">
                            <span>${typeIcon} ⏰${b.time} ${b.school} ${b.class} 學號${b.studentId}</span>
                            <div class="actions">
                                <button class="complete-btn" data-id="${b.id}">完成</button>
                                <button class="delete-btn" data-id="${b.id}">刪除</button>
                            </div>
                         </div>`;
            });
            listDiv.innerHTML = html;
        }
    }

    // 渲染學生表格
    function renderStudentTables() {
        const today = getTodayStr();
        const showAll = document.getElementById('showStudentAllStatus')?.checked || false;
        
        let pendingList = studentBookings.filter(b => b.status === 'pending' && (showAll || b.date >= today));
        let completedList = studentBookings.filter(b => b.status === 'completed');
        let noshowList = studentBookings.filter(b => b.status === 'no-show');
        
        pendingList.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
        completedList.sort((a,b) => (b.updatedAt || b.completedAt || '').localeCompare(a.updatedAt || a.completedAt || ''));
        noshowList.sort((a,b) => (b.updatedAt || b.noShowAt || '').localeCompare(a.updatedAt || a.noShowAt || ''));
        
        document.getElementById('studentCompletedTotal').innerText = completedList.length;
        document.getElementById('studentNoshowTotal').innerText = noshowList.length;
        document.getElementById('studentTotalCount').innerText = `(總數: ${studentBookings.length})`;
        
        document.getElementById('studentPendingTable').innerHTML = renderTable(pendingList, true, false, false, 'student');
        document.getElementById('studentCompletedTable').innerHTML = renderTable(completedList, false, true, false, 'student');
        document.getElementById('studentNoshowTable').innerHTML = renderTable(noshowList, false, false, true, 'student');
    }

    // 渲染家長表格
    function renderParentTables() {
        const today = getTodayStr();
        const showAll = document.getElementById('showParentAllStatus')?.checked || false;
        
        let pendingList = parentBookings.filter(b => b.status === 'pending' && (showAll || b.date >= today));
        let completedList = parentBookings.filter(b => b.status === 'completed');
        let noshowList = parentBookings.filter(b => b.status === 'no-show');
        
        pendingList.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
        completedList.sort((a,b) => (b.updatedAt || b.completedAt || '').localeCompare(a.updatedAt || a.completedAt || ''));
        noshowList.sort((a,b) => (b.updatedAt || b.noShowAt || '').localeCompare(a.updatedAt || a.noShowAt || ''));
        
        document.getElementById('parentCompletedTotal').innerText = completedList.length;
        document.getElementById('parentNoshowTotal').innerText = noshowList.length;
        document.getElementById('parentTotalCount').innerText = `(總數: ${parentBookings.length})`;
        
        document.getElementById('parentPendingTable').innerHTML = renderTable(pendingList, true, false, false, 'parent');
        document.getElementById('parentCompletedTable').innerHTML = renderTable(completedList, false, true, false, 'parent');
        document.getElementById('parentNoshowTable').innerHTML = renderTable(noshowList, false, false, true, 'parent');
    }

    function renderTable(bookingsArray, showComplete, showRevert, showDelete, type) {
        if (bookingsArray.length === 0) return '<div style="padding:20px; text-align:center;">無記錄</div>';
        
        let headers = ['學校', '班級', '學號', '日期', '時間', '師傅', '操作'];
        if (type === 'student') headers.unshift('Email');
        
        let html = '<table><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        
        bookingsArray.forEach(b => {
            html += '<tr>';
            if (type === 'student') html += `<td>${b.email || '-'}</td>`;
            html += `<td>${b.school || '-'}</td>`;
            html += `<td>${b.class || '-'}</td>`;
            html += `<td>${b.studentId || '-'}</td>`;
            html += `<td>${b.date || '-'}</td>`;
            html += `<td>${b.time || '-'}</td>`;
            html += `<td>${b.barber || '-'}</td>`;
            
            let actions = '';
            if (showComplete) actions += `<button class="action-btn complete-btn" data-id="${b.id}" data-type="${type}">完成</button>`;
            if (showRevert) actions += `<button class="action-btn revert-btn" data-id="${b.id}" data-type="${type}">返回</button>`;
            if (showDelete) actions += `<button class="action-btn delete-row-btn" data-id="${b.id}" data-type="${type}">刪除</button>`;
            html += `<td>${actions}</td>`;
            html += '</tr>';
        });
        html += '</tbody></table>';
        return html;
    }

    async function updateBookingStatus(id, status, fields = {}) {
        try {
            await db.collection("appointments").doc(id).update({ status, updatedAt: new Date().toISOString(), ...fields });
            return true;
        } catch(e) { console.error(e); return false; }
    }
    
    async function deleteBookingById(id) {
        try {
            await db.collection("appointments").doc(id).delete();
            return true;
        } catch(e) { console.error(e); return false; }
    }

    async function loadStats() {
        const completed = bookings.filter(b => b.status === 'completed');
        const totalStudents = completed.filter(b => b.type === 'student').length;
        const totalVouchers = completed.filter(b => b.voucherPurchased === true).length;
        document.getElementById('totalStudents').innerText = totalStudents;
        document.getElementById('totalVouchers').innerText = totalVouchers;
        
        const config = { barbers: ['師傅A', '師傅B', '師傅C', '師傅D'] };
        const barberStats = {};
        config.barbers.forEach(n => barberStats[n] = { services:0, vouchers:0 });
        completed.forEach(b => {
            if (b.barber && barberStats[b.barber]) {
                barberStats[b.barber].services++;
                if (b.voucherPurchased) barberStats[b.barber].vouchers++;
            }
        });
        const ctx = document.getElementById('barberChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: config.barbers,
                datasets: [
                    { label: '服務量 (已剪)', data: config.barbers.map(n=>barberStats[n].services), backgroundColor: '#F25C0A', borderRadius: 10 },
                    { label: '優惠券售出', data: config.barbers.map(n=>barberStats[n].vouchers), backgroundColor: '#28a745', borderRadius: 10 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    document.addEventListener('click', async function(e) {
        if (e.target.classList.contains('complete-btn')) {
            const id = e.target.dataset.id;
            if (confirm('標記為已完成？')) {
                await updateBookingStatus(id, 'completed', { completedAt: new Date().toISOString() });
                await fetchAllBookings();
                renderAdminCalendar();
                renderStudentTables();
                renderParentTables();
                showDateDetail(document.getElementById('selectedDateTitle').innerText.split(' ')[0]);
            }
        }
        if (e.target.classList.contains('revert-btn')) {
            const id = e.target.dataset.id;
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;
            const conflict = bookings.find(b => b.date === booking.date && b.time === booking.time && b.status === 'pending' && b.id !== id);
            if (conflict) { alert('無法返回：該時段已有其他待處理預約。'); return; }
            await updateBookingStatus(id, 'pending', { completedAt: null });
            await fetchAllBookings();
            renderAdminCalendar();
            renderStudentTables();
            renderParentTables();
        }
        if (e.target.classList.contains('delete-row-btn')) {
            const id = e.target.dataset.id;
            if (confirm('確定刪除此預約？')) {
                await deleteBookingById(id);
                await fetchAllBookings();
                renderAdminCalendar();
                renderStudentTables();
                renderParentTables();
                showDateDetail(document.getElementById('selectedDateTitle').innerText.split(' ')[0]);
            }
        }
    });

    document.getElementById('prevMonth').addEventListener('click', () => { adminMonth--; if (adminMonth<0) { adminMonth=11; adminYear--; } renderAdminCalendar(); });
    document.getElementById('nextMonth').addEventListener('click', () => { adminMonth++; if (adminMonth>11) { adminMonth=0; adminYear++; } renderAdminCalendar(); });
    document.getElementById('showStatsBtn').addEventListener('click', () => document.getElementById('statsSection').classList.toggle('hidden'));
    document.getElementById('refreshDataBtn').addEventListener('click', async () => { await fetchAllBookings(); renderAdminCalendar(); renderStudentTables(); renderParentTables(); loadStats(); alert('數據已刷新'); });
    document.getElementById('unlockStatsBtn').addEventListener('click', () => { if (document.getElementById('ownerPass').value === 'owner123') document.getElementById('statsContent').style.display = 'block'; else alert('店主密碼錯誤'); });
    document.getElementById('showStudentAllStatus').addEventListener('change', renderStudentTables);
    document.getElementById('showParentAllStatus').addEventListener('change', renderParentTables);
    document.getElementById('backToLoginBtn').addEventListener('click', () => { document.getElementById('adminMainPage').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden'); });
    document.getElementById('backToMainBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
        const pass = document.getElementById('adminLoginPass').value;
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('adminMainPage').classList.remove('hidden');
            await fetchAllBookings();
            renderAdminCalendar();
            renderStudentTables();
            renderParentTables();
            loadStats();
            document.getElementById('syncMainCalendar').checked = syncMain;
        } else alert('密碼錯誤');
    });

    // 影子月曆功能
    function renderShadowCalendar() {
        const year = new Date().getFullYear(), month = new Date().getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        document.getElementById('shadowMonthYear').innerText = `${year}年${month+1}月`;
        let html = '';
        for (let i = 0; i < firstDay; i++) html += '<div class="shadow-cell empty-cell"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const mark = shadowMarks[dateStr];
            const holidayClass = isHoliday(dateStr) ? 'holiday' : '';
            html += `<div class="shadow-cell ${holidayClass}" data-date="${dateStr}"><span>${d}</span>${mark ? `<span class="shadow-mark">${mark}</span>` : ''}</div>`;
        }
        document.getElementById('shadowGrid').innerHTML = html;
    }
    
    document.getElementById('shadowGrid').addEventListener('click', function(e) {
        const cell = e.target.closest('.shadow-cell');
        if (!cell || cell.classList.contains('empty-cell')) return;
        const dateStr = cell.dataset.date;
        const current = shadowMarks[dateStr];
        const input = prompt('請輸入數字 (1-9)，留空或0可清除', current || '');
        if (input === null) return;
        const num = parseInt(input, 10);
        if (isNaN(num) || num < 1 || num > 9) delete shadowMarks[dateStr];
        else shadowMarks[dateStr] = num;
        localStorage.setItem('hairWorldShadowMarks', JSON.stringify(shadowMarks));
        renderShadowCalendar();
    });
    
    renderShadowCalendar();
})();
</script>
</body>
</html>
