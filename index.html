<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Hair World 剪髮預約 (完整整合版)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 樣式部分保持不變，為節省篇幅此處省略，實際使用時請保留完整樣式 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #FFF5E6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 12px 0 30px 0; margin: 0; }
        .app-container { width: 100%; max-width: 400px; background-color: white; border-radius: 32px 32px 0 0; box-shadow: 0 8px 30px rgba(247, 147, 49, 0.15); overflow: hidden; padding: 20px 20px 30px 20px; margin: 10px 12px; border: 1px solid #FFD8B2; }
        .brand { display: flex; align-items: center; margin-bottom: 20px; padding-left: 6px; }
        .brand h1 { font-size: 28px; font-weight: 700; color: #F25C0A; letter-spacing: 1px; background: white; padding: 0 12px 0 0; }
        .brand span { background: #F25C0A; color: white; font-size: 14px; padding: 4px 12px; border-radius: 40px; font-weight: 500; margin-left: 4px; }
        /* ... 其餘樣式保持不變 ... */
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- HTML 結構保持不變，此處省略以節省篇幅，實際使用時請保留完整結構 -->
</div>
<script>
(function() {
    // ========== Firebase 初始化 ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCTgUIWXKjNZqp-bC1jk-XxZvoMihs6vO4",
        authDomain: "hairworld-2026.firebaseapp.com",
        projectId: "hairworld-2026",
        storageBucket: "hairworld-2026.firebasestorage.app",
        messagingSenderId: "531811271889",
        appId: "1:531811271889:web:62bf3e37996b9b154831f0",
        measurementId: "G-0EC2ND9LCN"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.signInAnonymously().catch(error => {
        console.error("匿名登入失敗", error);
        alert("無法匿名登入，請檢查 Firebase 設定");
    });

    // ========== 全域變數 ==========
    const PASSWORD_KEY = 'hairWorldAdminPassword';
    const DEVICE_ID_KEY = 'hairWorldDeviceId';
    const ACTIVITY_KEY = 'hairWorldActivity';
    const SHADOW_KEY = 'hairWorldShadowMarks';
    const SYNC_MAIN_KEY = 'hairWorldSyncMain';

    function getDeviceId() {
        let deviceId = localStorage.getItem(DEVICE_ID_KEY);
        if (!deviceId) {
            deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            localStorage.setItem(DEVICE_ID_KEY, deviceId);
        }
        return deviceId;
    }
    const deviceId = getDeviceId();

    let activities = JSON.parse(localStorage.getItem(ACTIVITY_KEY)) || [];
    function addActivity(booking) {
        const activity = { deviceId, timestamp: Date.now(), email: booking.email, school: booking.school, class: booking.class, studentId: booking.studentId, date: booking.date, time: booking.time };
        activities.push(activity);
        if (activities.length > 100) activities = activities.slice(-100);
        localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activities));
    }
    function clearOldActivities(hours = 1) {
        const cutoff = Date.now() - hours * 60 * 60 * 1000;
        activities = activities.filter(a => a.timestamp >= cutoff);
        localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activities));
    }
    function getSuspiciousActivities() {
        const cutoff = Date.now() - 60 * 60 * 1000;
        const recent = activities.filter(a => a.timestamp >= cutoff);
        const deviceCounts = {};
        recent.forEach(a => deviceCounts[a.deviceId] = (deviceCounts[a.deviceId] || 0) + 1);
        const suspiciousDevices = Object.keys(deviceCounts).filter(d => deviceCounts[d] > 1);
        return recent.filter(a => suspiciousDevices.includes(a.deviceId));
    }
    function renderSuspiciousTable() {
        clearOldActivities(1);
        const suspicious = getSuspiciousActivities();
        const tableDiv = document.getElementById('suspiciousTable');
        if (suspicious.length === 0) { tableDiv.innerHTML = '<div style="padding:10px; text-align:center;">✅ 目前無可疑活動</div>'; return; }
        let html = '<table><thead><tr><th>時間</th><th>學校</th><th>班級</th><th>學號</th><th>日期</th><th>時間</th></tr></thead><tbody>';
        suspicious.sort((a,b) => b.timestamp - a.timestamp).forEach(a => {
            const timeStr = new Date(a.timestamp).toLocaleTimeString('zh-HK', { hour12: false });
            html += `<tr><td>${timeStr}</td><td>${a.school}</td><td>${a.class}</td><td>${a.studentId}</td><td>${a.date}</td><td>${a.time}</td></tr>`;
        });
        html += '</tbody></table>';
        tableDiv.innerHTML = html;
    }
    document.getElementById('clearSuspicious')?.addEventListener('click', function() {
        activities = [];
        localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activities));
        renderSuspiciousTable();
    });

    let shadowMarks = JSON.parse(localStorage.getItem(SHADOW_KEY)) || {};
    function saveShadowMarks() { localStorage.setItem(SHADOW_KEY, JSON.stringify(shadowMarks)); }

    let syncMain = localStorage.getItem(SYNC_MAIN_KEY) !== 'false';
    document.getElementById('syncMainCalendar').checked = syncMain;
    document.getElementById('syncMainCalendar').addEventListener('change', function(e) {
        syncMain = e.target.checked;
        localStorage.setItem(SYNC_MAIN_KEY, syncMain);
        renderStudentCalendar();
    });

    // ========== 設定資料結構 ==========
    let bookings = [];
    let config = {
        School: [
            { name: '中學', short: '中', enabled: true },
            { name: '小學', short: '小', enabled: true }
        ],
        grades: [ { grade: '1', letters: ['A','B','C'] }, { grade: '2', letters: ['A','B','C','D','E','F'] }, { grade: '3', letters: ['A','B','C','D'] } ],
        limits: { '1A':25,'1B':25,'1C':25,'2A':18,'2B':18,'2C':18,'2D':18,'2E':18,'2F':18,'3A':20,'3B':20,'3C':20,'3D':20 },
        notice: "• 每位同學只可有一個有效預約。\n• 預約時間前2小時內無法修改或取消。\n• 預約只是分散人流，必須按照店舖人數排隊。",
        screenshotLabel: "確定已截圖的預約記錄",
        studentCardLabel: "我已準備好出示學生證核對",
        ntfyTopic: "hairworld_demo",
        ntfyEnabled: true,
        enableCaptcha: true,
        gradeNames: ['小一', '小二', '小三', '小四', '小五', '小六'],
        letterNames: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
        adminPassword: "admin123",
        staffPassword: "staff123",
        staffEditPassword: "edit123",
        staffCanEditDefault: false,
        barbers: ['師傅A', '師傅B', '師傅C', '師傅D'],
        visibleFields: { email: true, school: true, grade: true, class: true, studentId: true },
        requiredFields: { email: true, school: true, grade: true, class: true, studentId: true },
        allowDuplicate: { email: false, school: true, grade: true, class: true, studentId: false },
        fieldLabels: { email: "學生 Email", school: "學校名稱", grade: "年級", class: "班別", studentId: "學號" },
        showInRecords: { email: true, school: true, grade: true, class: true, studentId: true, barber: true },
        weekdaySlots: ['16:00','16:20','16:40','17:00','17:20','17:40','18:00','18:20','18:40'],
        holidaySlots: ['10:30','11:30','12:30'],
        dailyCutoff: ''
    };
    let adminPassword = config.adminPassword;
    let staffPassword = config.staffPassword;
    let staffEditPassword = config.staffEditPassword;
    let staffCanEditDefault = config.staffCanEditDefault;
    let staffEditMode = false;
    let lastBooking = null;

    // ... 其餘函數（applyFieldSettings, renderSchoolSelect, renderSchoolSettings, renderBarbersSettings, renderTimeSlotSettings, renderFieldSettings, 年級連動, 月曆, 管理員表格, 員工頁面, 事件綁定等）與先前完全相同，此處省略以節省篇幅，實際使用時請保留完整程式碼 ...

    // ========== 修改預約按鈕（修正版）==========
    document.getElementById('modifyBookingBtn').addEventListener('click', async function() {
        if (!lastBooking) {
            alert('請先進行一次預約後才能修改');
            return;
        }
        // 填入 Email
        document.getElementById('email').value = lastBooking.email || '';

        // 設定學校
        const schoolSelect = document.getElementById('school');
        schoolSelect.value = lastBooking.school;
        if (!schoolSelect.value) {
            alert('原學校已不存在或停用，無法修改');
            return;
        }

        // 解析班級格式：假設儲存的是 "1A" 或 "小一A"
        const classStr = lastBooking.class;
        let gradeNum, letter;
        const match = classStr.match(/^(\d+)([A-Za-z]+)$/);
        if (match) {
            gradeNum = match[1];
            letter = match[2];
        } else {
            const chineseMatch = classStr.match(/^([^\dA-Za-z]+)([A-Za-z]+)$/);
            if (chineseMatch) {
                const gradeName = chineseMatch[1];
                letter = chineseMatch[2];
                const index = config.gradeNames.indexOf(gradeName);
                gradeNum = index >= 0 ? (index + 1).toString() : null;
            }
        }
        if (!gradeNum || !letter) {
            alert('無法解析原班級格式，請手動選擇');
            return;
        }

        const gradeName = config.gradeNames[parseInt(gradeNum) - 1] || gradeNum;

        // 設定年級
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.value = gradeName;
        gradeSelect.dispatchEvent(new Event('change'));

        await new Promise(resolve => setTimeout(resolve, 200));

        // 設定班別
        const letterSelect = document.getElementById('letterSelect');
        letterSelect.value = letter;
        letterSelect.dispatchEvent(new Event('change'));

        await new Promise(resolve => setTimeout(resolve, 200));

        // 設定學號
        const studentSelect = document.getElementById('studentId');
        studentSelect.value = lastBooking.studentId;
    });

    // ========== 其餘事件綁定、初始化等保持不變 ==========
    // ... 請保留您原有的所有後續程式碼 ...

})();
</script>
</body>
</html>
